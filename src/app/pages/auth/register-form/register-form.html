<mat-card class="register-card">
  <mat-card-header>
    <mat-card-title>Create account</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <stx-input
        appearance="fill"
        formControlName="email"
        icon="mail"
        id="reg-email"
        label="Email"
        name="email"
        placeholder="example@domain.com"
        type="email"
        [customErrors]="emailErrors" />

      <stx-input
        appearance="fill"
        formControlName="password"
        icon="lock"
        id="reg-password"
        label="Password"
        name="password"
        placeholder="Password"
        type="password"
        [customErrors]="passwordErrors" />

      <stx-input
        appearance="fill"
        formControlName="confirmPassword"
        icon="lock_reset"
        id="reg-confirm-password"
        label="Confirm password"
        name="confirmPassword"
        placeholder="Confirm password"
        type="password"
        [customErrors]="confirmPasswordErrors" />

      <div class="form-actions">
        <stx-button type="submit" [btnConfig]="submitBtnConfig()" [isDisabled]="registerForm.invalid || isLoading()" />

        <stx-button [btnConfig]="loginLinkConfig" />
      </div>
    </form>
  </mat-card-content>
</mat-card>

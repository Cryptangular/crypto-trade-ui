<div class="login-container">
  <h2>Log in</h2>
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <stx-input
      formControlName="email"
      icon="mail"
      id="login-email"
      label="Email"
      name="email"
      placeholder="example@domain.com"
      type="email"
      [customErrors]="emailErrors" />

    <stx-input
      formControlName="password"
      icon="lock"
      id="login-password"
      label="Password"
      name="password"
      placeholder="Password"
      type="password"
      [customErrors]="passwordErrors" />

    <div class="form-actions">
      <stx-button type="submit" [btnConfig]="submitBtnConfig()" [isDisabled]="loginForm.invalid || isLoading()" />

      <stx-button [btnConfig]="registerLinkConfig" />
    </div>
  </form>
</div>

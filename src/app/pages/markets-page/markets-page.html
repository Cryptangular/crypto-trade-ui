<div class="markets-container">
  <div class="markets-header">
    <h2>Top Tokens by Market Capitalization</h2>
  </div>

  <table class="crypto-table mat-elevation-z0" mat-table [dataSource]="tokens()" [trackBy]="trackBySymbol">
    <ng-container matColumnDef="coin">
      <th *matHeaderCellDef mat-header-cell>Name</th>
      <td *matCellDef="let token" class="coin-cell" mat-cell>
        <span class="base-asset">{{ token.baseAsset }} / {{token.quoteAsset}}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="price">
      <th *matHeaderCellDef class="text-right" mat-header-cell>Price</th>
      <td *matCellDef="let token" class="text-right price-cell" mat-cell>${{ token.price }}</td>
    </ng-container>

    <ng-container matColumnDef="change24h">
      <th *matHeaderCellDef class="text-right" mat-header-cell>Change</th>
      <td
        *matCellDef="let token"
        class="text-right change-cell"
        mat-cell
        [class.negative-text]="token.change24h.startsWith('-')"
        [class.positive-text]="!token.change24h.startsWith('-')">
        {{ token.change24h.startsWith('-') ? '' : '+' }}{{ token.change24h }}%
      </td>
    </ng-container>

    <ng-container matColumnDef="volume">
      <th *matHeaderCellDef class="text-right" mat-header-cell>24h Volume</th>
      <td *matCellDef="let token" class="text-right volume-cell" mat-cell>${{ token.volume24h }}</td>
    </ng-container>

    <tr *matHeaderRowDef="displayedColumns" mat-header-row></tr>
    <tr
      *matRowDef="let row; columns: displayedColumns;"
      class="crypto-row"
      mat-row
      (click)="navigateToTrade(row.symbol)"></tr>

    <tr *matNoDataRow class="mat-row">
      <td class="mat-cell loading" [attr.colspan]="displayedColumns.length">Loading market data...</td>
    </tr>
  </table>
</div>

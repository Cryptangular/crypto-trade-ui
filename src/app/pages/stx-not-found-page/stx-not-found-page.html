<section class="not-found">
  <div class="not-found__wrapper">
    <img
      alt="not found page"
      class="not-found__image"
      height="260"
      ngSrc="./assets/images/png/404.png"
      priority
      width="400" />

    <div class="not-found__message">
      <h1 class="not-found__title">Page not found</h1>
      <p class="not-found__phrase">We're sorry, but something went wrong.</p>
    </div>
    <div class="not-found__nav">
      <stx-button [btnConfig]="toHomePageBtnConfig" />
    </div>
  </div>
</section>

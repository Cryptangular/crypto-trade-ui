<div class="registration-container">
  <h2>Create account</h2>
  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    <stx-input
      formControlName="email"
      icon="mail"
      id="reg-email"
      label="Email"
      name="email"
      placeholder="example@domain.com"
      type="email"
      [customErrors]="emailErrors" />

    <stx-input
      formControlName="password"
      icon="lock"
      id="reg-password"
      label="Password"
      name="password"
      placeholder="Password"
      type="password"
      [customErrors]="passwordErrors" />

    <stx-input
      formControlName="confirmPassword"
      icon="lock_reset"
      id="reg-confirm-password"
      label="Confirm password"
      name="confirmPassword"
      placeholder="Confirm password"
      type="password"
      [customErrors]="confirmPasswordErrors" />
    <div class="form-actions">
      <stx-button type="submit" [btnConfig]="submitBtnConfig()" [isDisabled]=" registerForm.invalid" />

      <stx-button [btnConfig]="loginLinkConfig" />
    </div>
  </form>
</div>

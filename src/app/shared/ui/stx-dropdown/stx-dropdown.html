<mat-form-field [appearance]="appearance()">
  @if(label()) {
  <mat-label>{{ label() }}</mat-label>
  }
  <mat-select
    [attr.name]="name()"
    [compareWith]="compareWith()"
    [errorStateMatcher]="customErrorStateMatcher() || defaultErrorStateMatcher"
    [formControl]="control"
    [id]="id()"
    [multiple]="multiple()"
    [placeholder]="placeholder()"
    (blur)="markAsTouched()">
    @for(option of options(); track option.value){
    <mat-option [disabled]="option.disabled" [value]="option.value">{{option.viewValue}}</mat-option>
    }
  </mat-select>
  @if (icon()) {
  <mat-icon aria-hidden="false" matSuffix [fontIcon]="icon()" />
  } @if(control.errors) {
  <mat-error>{{ control.errors | stxErrorMessage : customErrors(): name() }}</mat-error>
  }
</mat-form-field>

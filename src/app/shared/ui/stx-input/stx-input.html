<mat-form-field class="stx-input" [appearance]="appearance()">
  @if (label()) {
  <mat-label>{{ label() }}</mat-label>
  }

  <input
    matInput
    [errorStateMatcher]="customErrorStateMatcher() || defaultErrorStateMatcher"
    [formControl]="control"
    [id]="id()"
    [name]="name()"
    [placeholder]="placeholder()"
    [type]="typeHandler()"
    (blur)="markAsTouched()"
    (input)="onInput($event)" />

  @if (icon() || secret()) {
  <mat-icon aria-hidden="false" matSuffix [fontIcon]="iconHandler()" (click)="onIconClick($event)" />
  } @if (control.errors) {
  <mat-error>{{ control.errors | stxErrorMessage : customErrors(): name() }}</mat-error>
  }
</mat-form-field>

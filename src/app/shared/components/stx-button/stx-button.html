@if (isIconAppearance()) {
<button class="stx-button" matIconButton [disabled]="isDisabled()" [type]="type()" (click)="onClick($event)">
  <mat-icon>{{ btnConfig().icon }} </mat-icon></button
>} @else {
<button
  class="stx-button"
  [disabled]="isDisabled()"
  [matButton]="matButtonAppearance()"
  [type]="type()"
  (click)="onClick($event)">
  @if (btnConfig().icon) {
  <mat-icon>{{ btnConfig().icon }}</mat-icon>
  } {{ btnConfig().label }}
</button>
}

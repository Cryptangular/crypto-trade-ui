<header class="stx-header">
  <a class="stx-logo" routerLink="/dashboard">
    <img alt="stonks" class="stx-logo__image" height="25" ngSrc="./assets/images/logo.svg" width="25" />
    <span class="stx-logo__title">stonks</span>
  </a>
  <stx-search-bar (searchChanged)="onChange($event)" />
  <nav aria-label="main navigation" class="stx-nav">
    <ul class="stx-nav__list">
      @for(linkConfig of navButtonConfigs(); track linkConfig.href){
      <li class="stx-nav__item">
        <stx-button [btnConfig]="linkConfig" />
      </li>
      }
    </ul>
  </nav>
  <stx-connection-status [status]="true" />
  <stx-button [btnConfig]="settingBtnConfig" />
</header>
